<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scorele - Daily Quiz Score Tracker</title>
    <meta name="description" content="Track your daily quiz game scores for Wordle, Wørdle, Wordle Geographic, Travle, and Bandle">
    <meta name="keywords" content="wordle, score tracker, quiz games, daily games, travle, bandle">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 Scorele</h1>
            <p class="subtitle">Track your daily quiz game scores</p>
        </header>

        <main>
            <section class="game-input">
                <h2>Add Today's Score</h2>
                <form id="scoreForm">
                    <div class="form-group">
                        <label for="game">Game:</label>
                        <select id="game" name="game" required>
                            <option value="">Select a game</option>
                            <option value="wordle">Wordle</option>
                            <option value="worlde">Wørdle</option>
                            <option value="wordle-geo">Wordle (Geographic)</option>
                            <option value="travle">Travle</option>
                            <option value="bandle">Bandle</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="tries">Number of tries:</label>
                        <input type="number" id="tries" name="tries" min="1" max="6" required>
                        <div class="special-options">
                            <button type="button" id="failedBtn" class="special-btn">❌ Failed</button>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="date">Date:</label>
                        <input type="date" id="date" name="date" required>
                    </div>
                    
                    <button type="submit" class="submit-btn">Add Score</button>
                </form>
            </section>

            <section class="stats-section">
                <h2>Your Statistics</h2>
                <div id="statsContainer">
                    <div class="stats-grid">
                        <div class="stat-card">
                            <h3>Total Games</h3>
                            <div class="stat-value" id="totalGames">0</div>
                        </div>
                        <div class="stat-card">
                            <h3>Success Rate</h3>
                            <div class="stat-value" id="successRate">0%</div>
                        </div>
                        <div class="stat-card">
                            <h3>Average Tries</h3>
                            <div class="stat-value" id="avgTries">0</div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="history-section">
                <h2>Recent Scores</h2>
                <div id="scoresContainer">
                    <div id="scoresList" class="scores-list">
                        <!-- Scores will be populated here -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
